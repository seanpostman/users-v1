openapi: 3.0.3
info:
  title: Demo Users API
  description: A simple RESTful API for managing users.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Demo server
paths:
  /users:
    get:
      summary: List users
      description: Returns a list of users.
      operationId: listUsers
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: Ada
        lastName:
          type: string
          example: Lovelace
        email:
          type: string
          format: email
          example: ada@example.com
        role:
          type: string
          example: admin
        createdAt:
          type: string
          format: date-time
          example: "2026-07-09T10:00:00Z"
