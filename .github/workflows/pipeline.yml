name: Users CI/CD Run

on: push

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x' 
      - run: |
          curl -o- "https://dl-cli.pstmn.io/install/linux64.sh" | sh
      - run: postman login --with-api-key ${{ secrets.POSTMAN_API_KEY }}
      - run: npm ci
      - run: npm run deploy
      - run: npm test
